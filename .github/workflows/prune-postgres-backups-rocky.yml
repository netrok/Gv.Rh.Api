name: Prune PostgreSQL Backups Rocky

on:
  workflow_dispatch:
    inputs:
      keep_latest:
        description: "Cuántos backups manuales conservar"
        required: true
        default: "30"
      dry_run:
        description: "Solo simular, no borrar"
        required: true
        default: "true"

jobs:
  prune-backups:
    name: Prune PostgreSQL backups on Rocky
    runs-on:
      - self-hosted
    timeout-minutes: 10

    steps:
      - name: Prune old manual PostgreSQL backups
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_DIR="/opt/gv-rh-demo"
          BACKUP_DIR="$PROJECT_DIR/backups"
          KEEP_LATEST="${{ github.event.inputs.keep_latest }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"

          echo "Starting PostgreSQL backup retention workflow"
          echo "Backup directory: $BACKUP_DIR"
          echo "Keep latest: $KEEP_LATEST"
          echo "Dry run: $DRY_RUN"

          if ! [[ "$KEEP_LATEST" =~ ^[0-9]+$ ]]; then
            echo "ERROR: keep_latest must be a number."
            exit 1
          fi

          if [ "$KEEP_LATEST" -lt 1 ]; then
            echo "ERROR: keep_latest must be at least 1."
            exit 1
          fi

          if [ "$DRY_RUN" != "true" ] && [ "$DRY_RUN" != "false" ]; then
            echo "ERROR: dry_run must be true or false."
            exit 1
          fi

          cd "$PROJECT_DIR"

          if [ ! -d "$BACKUP_DIR" ]; then
            echo "ERROR: backup directory does not exist: $BACKUP_DIR"
            exit 1
          fi

          echo "Disk usage before cleanup:"
          df -h "$PROJECT_DIR"
          du -sh "$BACKUP_DIR" || true

          echo "Current manual backups:"
          ls -lh "$BACKUP_DIR"/gv_rh_manual_*.backup 2>/dev/null || true

          mapfile -t BACKUPS < <(ls -1t "$BACKUP_DIR"/gv_rh_manual_*.backup 2>/dev/null || true)

          TOTAL="${#BACKUPS[@]}"
          echo "Manual backup count: $TOTAL"

          if [ "$TOTAL" -le "$KEEP_LATEST" ]; then
            echo "Nothing to prune. Current count ($TOTAL) is <= keep_latest ($KEEP_LATEST)."
            exit 0
          fi

          echo "Backups that will be kept:"
          printf '%s\n' "${BACKUPS[@]:0:$KEEP_LATEST}"

          echo "Backups selected for deletion:"
          DELETE_LIST=("${BACKUPS[@]:$KEEP_LATEST}")
          printf '%s\n' "${DELETE_LIST[@]}"

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN enabled. No files were deleted."
            exit 0
          fi

          echo "Deleting old manual backups..."
          for file in "${DELETE_LIST[@]}"; do
            if [[ "$file" == "$BACKUP_DIR"/gv_rh_manual_*.backup ]]; then
              rm -f -- "$file"
              echo "Deleted: $file"
            else
              echo "Skipped unexpected file: $file"
            fi
          done

          echo "Disk usage after cleanup:"
          df -h "$PROJECT_DIR"
          du -sh "$BACKUP_DIR" || true

          echo "Remaining manual backups:"
          ls -lh "$BACKUP_DIR"/gv_rh_manual_*.backup 2>/dev/null || true

          echo "Backup retention completed successfully."

      - name: Write summary
        shell: bash
        run: |
          echo "### PostgreSQL backup retention completed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Server: Rocky Linux" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backup path: \`/opt/gv-rh-demo/backups\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pattern affected: \`gv_rh_manual_*.backup\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Keep latest: \`${{ github.event.inputs.keep_latest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dry run: \`${{ github.event.inputs.dry_run }}\`" >> "$GITHUB_STEP_SUMMARY"
