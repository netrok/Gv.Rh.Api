name: Health Alert Rocky

on:
  workflow_dispatch:
    inputs:
      force_fail:
        description: "Forzar falla para probar correo"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "*/15 * * * *"

jobs:
  health-alert:
    name: Check Rocky health and alert if failing
    runs-on:
      - self-hosted
    timeout-minutes: 10

    steps:
      - name: Run Rocky health alert script
        shell: bash
        env:
          FORCE_FAIL_INPUT: ${{ github.event.inputs.force_fail || 'false' }}
        run: |
          set -euo pipefail

          FORCE_FAIL="${FORCE_FAIL_INPUT:-false}"

          echo "Running GV RH health alert script..."
          echo "Force fail: $FORCE_FAIL"

          /usr/local/bin/gv-rh-health-alert.sh "$FORCE_FAIL"

      - name: Write summary
        shell: bash
        run: |
          echo "### Health check completed successfully" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Script: \`/usr/local/bin/gv-rh-health-alert.sh\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- API: healthy" >> "$GITHUB_STEP_SUMMARY"
          echo "- Web: healthy" >> "$GITHUB_STEP_SUMMARY"
          echo "- DB: healthy" >> "$GITHUB_STEP_SUMMARY"
          echo "- Health endpoint: OK" >> "$GITHUB_STEP_SUMMARY"
          echo "- Alert email: only sent on failure" >> "$GITHUB_STEP_SUMMARY"